# vim install-config.yaml
apiVersion: v1
baseDomain: anishs.xyz     
compute:
- hyperthreading: Enabled
  name: worker
  replicas: 2            
controlPlane:
  hyperthreading: Enabled
  name: master
  replicas: 3
metadata:
  name: ocp         
networking:
  clusterNetwork:
  - cidr: 10.128.0.0/14           
    hostPrefix: 23     
  networkType: OVNKubernetes
  serviceNetwork:
  - 172.30.0.0/16   
platform:
  none: {}   
fips: false
pullSecret: <>
sshKey: 'ssh-rsa  root@anish-bastion-ocp'
